<!-- Google Fonts + Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #fef9f5;
    color: #1e1e2a;
    scroll-behavior: smooth;
  }

  /* Navigation Bar */
  .navbar {
    background: #0a0a14;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    border-bottom: 1px solid rgba(255,215,180,0.2);
    flex-wrap: wrap;
    gap: 1rem;
  }

  .logo h1 {
    font-size: 1.9rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #f5e7d9, #e6c8a0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .nav-links a {
    color: #fae3b6;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
    font-size: 0.95rem;
    cursor: pointer;
  }

  .nav-links a:hover {
    color: #d4af7a;
  }

  /* Language Toggle Button */
  .lang-toggle {
    background: #d4af7a;
    border: none;
    border-radius: 60px;
    padding: 0.5rem 1.2rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: 0.2s;
    color: #1e1e1a;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .lang-toggle:hover {
    background: #e6c8a0;
    transform: scale(0.97);
  }

  .hero {
    text-align: center;
    padding: 4rem 2rem 3rem;
    background: linear-gradient(145deg, #fff8f2 0%, #f7ede3 100%);
  }

  .hero h2 {
    font-size: 2.8rem;
    font-weight: 600;
    color: #2c221b;
    letter-spacing: -0.02em;
  }

  .hero p {
    font-size: 1.2rem;
    color: #6b4e3a;
    margin-top: 0.8rem;
  }

  /* Search Bar - Now near products */
  .search-section {
    padding: 0 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .search-bar-container {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .search-bar {
    background: white;
    border: 2px solid #decba4;
    border-radius: 60px;
    padding: 0.3rem 0.3rem 0.3rem 1.5rem;
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 500px;
    transition: all 0.3s;
  }

  .search-bar:focus-within {
    border-color: #cb9c6e;
    box-shadow: 0 0 0 3px rgba(203,156,110,0.2);
  }

  .search-bar input {
    flex: 1;
    border: none;
    padding: 0.8rem 0.5rem;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    outline: none;
    background: transparent;
  }

  .search-bar button {
    background: #d4af7a;
    border: none;
    border-radius: 50px;
    padding: 0.7rem 1.5rem;
    cursor: pointer;
    font-weight: 600;
    color: #1e1e1a;
    transition: 0.2s;
    font-family: inherit;
  }

  .search-bar button:hover {
    background: #be8c5c;
    color: white;
  }

  .filters {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 1.5rem 1rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1.5px solid #decba4;
    padding: 0.6rem 1.6rem;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: 0.2s;
    color: #3a2c23;
    font-family: inherit;
  }

  .filter-btn.active, .filter-btn:hover {
    background: #decba4;
    color: #1e1e1a;
    border-color: #decba4;
    transform: scale(0.97);
  }

  /* Products Grid */
  .products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
    padding: 1rem 2rem 3rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Skeleton Loader */
  .skeleton-card {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    border: 1px solid #f0e2d4;
  }

  .skeleton-img {
    width: 100%;
    height: 320px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .skeleton-text {
    height: 20px;
    background: #e8e8e8;
    margin: 1rem;
    border-radius: 8px;
  }

  .skeleton-text.short {
    width: 60%;
  }

  .skeleton-text.medium {
    width: 80%;
  }

  .skeleton-button {
    height: 45px;
    background: #e8e8e8;
    margin: 0.5rem 1rem 1.2rem;
    border-radius: 100px;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .card {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.02), 0 6px 6px rgba(0, 0, 0, 0.03);
    border: 1px solid #f0e2d4;
    display: flex;
    flex-direction: column;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.15);
    border-color: #ecd9c0;
  }

  .card-img {
    width: 100%;
    height: 320px;
    object-fit: cover;
    transition: transform 0.4s;
  }

  .card:hover .card-img {
    transform: scale(1.02);
  }

  .card h3 {
    margin: 1rem 1rem 0.3rem;
    font-size: 1.25rem;
    font-weight: 600;
    color: #2f241d;
  }

  .card-summary {
    margin: 0 1rem 0.5rem;
    font-size: 0.85rem;
    color: #7a5a44;
    line-height: 1.3;
  }

  .price-badge {
    margin: 0 1rem;
    font-weight: 700;
    color: #b47c44;
    font-size: 1.1rem;
  }

  .availability {
    margin: 0.4rem 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    display: inline-block;
    background: #f2e6dc;
    padding: 4px 12px;
    border-radius: 40px;
    width: fit-content;
    color: #8b5a35;
  }

  .card-buttons {
    margin: 0.8rem 1rem 1.2rem;
    display: flex;
    gap: 10px;
  }

  .btn-wa, .btn-details {
    flex: 1;
    padding: 0.7rem 0;
    border: none;
    border-radius: 100px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: 0.2s;
  }

  .btn-wa {
    background: #25a55b;
    color: white;
  }

  .btn-wa:hover {
    background: #1b8b4b;
    transform: scale(0.98);
  }

  .btn-details {
    background: #2b211c;
    color: #ffefdf;
  }

  .btn-details:hover {
    background: #be8c5c;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(5px);
  }

  .modal-content {
    background: white;
    max-width: 900px;
    width: 90%;
    border-radius: 32px;
    overflow-y: auto;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    position: relative;
    animation: fadeInUp 0.3s ease;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .modal-close {
    position: absolute;
    top: 18px;
    right: 22px;
    font-size: 2rem;
    cursor: pointer;
    color: #2b211c;
    background: rgba(255,255,240,0.9);

    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    z-index: 10;
  }

  .modal-close:hover {
    background: #cb9c6e;
    color: white;
  }

  .modal-grid {
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
  }

  .modal-img {
    flex: 1.2;
    background: #f9f2ea;
    border-radius: 28px 0 0 28px;
    overflow: hidden;
  }

  .modal-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .modal-info {
    flex: 1;
    padding: 2rem 1.8rem;
  }

  .modal-info h2 {
    font-size: 1.8rem;
    margin-bottom: 0.75rem;
    color: #2f241d;
  }

  .modal-info .modal-price {
    font-size: 1.6rem;
    font-weight: 700;
    color: #b47c44;
    margin: 0.5rem 0;
  }

  .modal-info .modal-availability {
    background: #f2e6dc;
    padding: 6px 14px;
    border-radius: 60px;
    font-size: 0.8rem;
    font-weight: 600;
    width: fit-content;
    margin: 0.75rem 0;
  }

  .modal-desc, .modal-material, .modal-fit {
    margin: 0.8rem 0;
    line-height: 1.4;
    color: #4e3a2c;
  }

  .modal-actions {
    display: flex;
    gap: 15px;
    margin-top: 1.5rem;
  }

  .modal-btn {
    flex: 1;
    padding: 0.9rem;
    border-radius: 60px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .modal-btn-wa {
    background: #25a55b;
    color: white;
  }

  .modal-btn-check {
    background: #decba4;
    color: #2b211c;
  }

  /* Scroll to Top Button */
  .scroll-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #cb9c6e;
    color: white;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
    z-index: 99;
    border: none;
    font-size: 1.2rem;
  }

  .scroll-top.visible {
    opacity: 1;
    visibility: visible;
  }

  .scroll-top:hover {
    background: #a87548;
    transform: scale(1.05);
  }

  footer {
    text-align: center;
    padding: 2rem;
    margin-top: 2rem;
    font-size: 0.85rem;
    color: #9a7b62;
    border-top: 1px solid #eedfcb;

  @media (max-width: 700px) {
    .products {
      padding: 1rem;
      gap: 1rem;
    }
    .hero h2 {
      font-size: 1.9rem;
    }
    .modal-grid {
      flex-direction: column;
    }
    .modal-img {
      border-radius: 28px 28px 0 0;
      max-height: 280px;
    }
    .navbar {
      flex-direction: column;
      text-align: center;
    }
    .nav-links {
      justify-content: center;
    }
    .search-bar {
      max-width: 100%;
    }
  }
</style>
</head>

  function updateUILanguage() {
    // Update all elements with data-en and data-sw attributes
    document.querySelectorAll('[data-en]').forEach(el => {
      if (currentLang === 'en') {
        el.textContent = el.getAttribute('data-en');
      } else {
        el.textContent = el.getAttribute('data-sw');
      }
    });
    
    // Update modal labels
    if (document.getElementById('descLabel')) {
      document.getElementById('descLabel').textContent = translations[currentLang].descLabel;
      document.getElementById('materialLabel').textContent = translations[currentLang].materialLabel;
      document.getElementById('fitLabel').textContent = translations[currentLang].fitLabel;
      document.getElementById('askWaLabel').textContent = translations[currentLang].askWaLabel;
      document.getElementById('checkLabel').textContent = translations[currentLang].checkLabel;
    }
    
    // Update search placeholder
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
      searchInput.placeholder = currentLang === 'en' ? 'Search products...' : 'Tafuta bidhaa...';
    }
    
    // Update lang toggle button text
    const langText = document.getElementById('langText');
    if (langText) {
      langText.textContent = currentLang === 'en' ? 'Kiswahili' : 'English';
    }
  }
  
  function toggleLanguage() {
    currentLang = currentLang === 'en' ? 'sw' : 'en';
    updateUILanguage();
    // Re-render products to update availability text etc (optional but good)
    applyFiltersAndSearch();
  }
  
  // Helper to get translated text for dynamic content

    return translations[currentLang][key] || translations['en'][key] || key;

  // ==============================================
  // WHATSAPP
  // ==============================================
  const BUSINESS_NUMBER = "255685757069";
  
  function generateWhatsAppMessage(productName) {
    const message = currentLang === 'en' 
      ? `Hello NEMA Fashion,\n\nI am interested in:\n\n${productName}\n\nPlease confirm:\n• Availability\n• Available colors\n• Available sizes\n• Current price\n\nThank you.`
      : `Habari NEMA Fashion,\n\nNina nia ya:\n\n${productName}\n\nTafadhali thibitisha:\n• Upatikanaji\n• Rangi zilizopo\n• Ukubwa uliopo\n• Bei ya sasa\n\nAsante.`;
    return encodeURIComponent(message);
  }
  
  function openWhatsApp(productName) {
    const message = generateWhatsAppMessage(productName);
    window.open(`https://wa.me/${BUSINESS_NUMBER}?text=${message}`, "_blank");
  }
  
  // Contact link handler
  document.getElementById("contactLink")?.addEventListener("click", (e) => {
    e.preventDefault();
    openWhatsApp("NEMA Fashion");
  });

  let currentFilter = "all";
  let currentSearchTerm = "";
  let currentDisplayProducts = [];
  
  // ==============================================
  // RENDER FUNCTIONS
  // ==============================================
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function getLocalizedText(product, fieldEn, fieldSw) {
    if (currentLang === 'sw' && product[fieldSw]) {
      return product[fieldSw];
    }
    return product[fieldEn];
  }
  
  function showSkeletonLoaders() {
    const container = document.getElementById("productsContainer");
    if (!container) return;
    container.innerHTML = "";
    for (let i = 0; i < 6; i++) {
      container.innerHTML += `
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-text"></div>
          <div class="skeleton-text short"></div>
          <div class="skeleton-text medium"></div>
          <div class="skeleton-button"></div>
        </div>
      `;
    }
  }
  
  function renderProducts(productsArray) {
    const container = document.getElementById("productsContainer");
    if (!container) return;
    
    if (!productsArray.length) {
      container.innerHTML = `<div style="text-align:center;padding:3rem;background:#fff8f0;border-radius:2rem;">${t('noProducts')}</div>`;
      return;
    }
    
    container.innerHTML = "";
    productsArray.forEach((product, index) => {
      const card = document.createElement("div");
      card.className = "card";
      card.style.animationDelay = `${index * 0.03}s`;
      const summary = getLocalizedText(product, 'summary', 'summarySw');
      const availability = getLocalizedText(product, 'availability', 'availabilitySw');
      
      card.innerHTML = `
        <img class="card-img" src="${product.image}" alt="${escapeHtml(product.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=400&auto=format'">
        <h3>${escapeHtml(product.name)}</h3>
        <div class="card-summary">${escapeHtml(summary)}</div>
        <div class="price-badge">TZS ${product.price.toLocaleString()}</div>
        <div class="availability"><i class="fas fa-info-circle"></i> ${escapeHtml(availability)}</div>
        <div class="card-buttons">
          <button class="btn-wa" data-id="${product.id}"><i class="fab fa-whatsapp"></i> ${currentLang === 'en' ? 'Ask on WhatsApp' : 'Uliza kwa WhatsApp'}</button>
          <button class="btn-details" data-id="${product.id}"><i class="fas fa-eye"></i> ${currentLang === 'en' ? 'View Details' : 'Angalia Maelezo'}</button>
        </div>
      `;
      container.appendChild(card);
    });
    
    document.querySelectorAll('.btn-wa').forEach(btn => {
      btn.removeEventListener('click', waHandler);
      btn.addEventListener('click', waHandler);
    });
    document.querySelectorAll('.btn-details').forEach(btn => {
      btn.removeEventListener('click', detailsHandler);
      btn.addEventListener('click', detailsHandler);
    });
  }
  
  function waHandler(e) {
    const cardDiv = e.currentTarget.closest('.card');
    if (!cardDiv) return;
    const nameElem = cardDiv.querySelector('h3');
    if (nameElem) {
      openWhatsApp(nameElem.innerText);
    } else {
      openWhatsApp("this product");
    }
  }
  
  function detailsHandler(e) {
    const btn = e.currentTarget;
    const productId = parseInt(btn.getAttribute('data-id'));
    const product = masterProducts.find(p => p.id === productId);
    if (product) {
      openProductModal(product);
    }
  }
  
  // ==============================================
  // MODAL
  // ==============================================
  function openProductModal(product) {
    const modal = document.getElementById("productModal");
    document.getElementById("modalImage").src = product.image;
    document.getElementById("modalName").innerText = product.name;
    document.getElementById("modalPrice").innerHTML = `TZS ${product.price.toLocaleString()}`;
    
    const availability = getLocalizedText(product, 'availability', 'availabilitySw');
    document.getElementById("modalAvailability").innerHTML = `<i class="fas fa-truck"></i> ${availability}`;
    
    const description = getLocalizedText(product, 'description', 'descriptionSw');
    const material = getLocalizedText(product, 'material', 'materialSw');
    const fit = getLocalizedText(product, 'fit', 'fitSw');
    
    document.getElementById("modalDesc").innerText = description;
    document.getElementById("modalMaterial").innerText = material;
    document.getElementById("modalFit").innerText = fit;
    
    // Update modal button texts based on language
    document.getElementById("askWaLabel").textContent = translations[currentLang].askWaLabel;
    document.getElementById("checkLabel").textContent = translations[currentLang].checkLabel;
    document.getElementById("descLabel").textContent = translations[currentLang].descLabel;
    document.getElementById("materialLabel").textContent = translations[currentLang].materialLabel;
    document.getElementById("fitLabel").textContent = translations[currentLang].fitLabel;
    
    const modalWaBtn = document.getElementById("modalWhatsAppBtn");
    const modalCheckBtn = document.getElementById("modalCheckBtn");
    
    modalWaBtn.replaceWith(modalWaBtn.cloneNode(true));
    modalCheckBtn.replaceWith(modalCheckBtn.cloneNode(true));
    const freshWa = document.getElementById("modalWhatsAppBtn");
    const freshCheck = document.getElementById("modalCheckBtn");
    if (freshWa) freshWa.addEventListener("click", () => openWhatsApp(product.name));
    if (freshCheck) freshCheck.addEventListener("click", () => openWhatsApp(product.name));
    
    modal.style.display = "flex";
  }
  
  function closeModal() {
    const modal = document.getElementById("productModal");
    modal.style.display = "none";
  }
  
  // ==============================================
  // FILTERS & SEARCH
  // ==============================================
  function applyFiltersAndSearch() {
    let filtered = [...masterProducts];
    if (currentFilter !== "all") {
      filtered = filtered.filter(p => p.category === currentFilter);
    }
    if (currentSearchTerm.trim() !== "") {
      const term = currentSearchTerm.trim().toLowerCase();
      filtered = filtered.filter(p => {
        return p.name.toLowerCase().includes(term) ||
               (p.summary && p.summary.toLowerCase().includes(term)) ||
               (p.summarySw && p.summarySw.toLowerCase().includes(term)) ||
               (p.description && p.description.toLowerCase().includes(term)) ||
               (p.keywords && Array.isArray(p.keywords) && p.keywords.some(k => k.toLowerCase().includes(term)));
      });
    }
    currentDisplayProducts = filtered;
    renderProducts(currentDisplayProducts);
  }
  
  function setFilter(category) {
    currentFilter = category;
    updateFilterUI();
    applyFiltersAndSearch();
  }
  
  function updateFilterUI() {
    const btns = document.querySelectorAll(".filter-btn");
    btns.forEach(btn => {
      const cat = btn.getAttribute("data-cat");
      if ((cat === currentFilter) || (cat === "all" && currentFilter === "all")) {
        btn.classList.add("active");
      } else {
        btn.classList.remove("active");
      }
    });
  }
  
  function buildCategoryFilters() {
    if (!masterProducts.length) return;
    const catsSet = new Set();
    catsSet.add("all");
    masterProducts.forEach(p => {
      if (p.category) catsSet.add(p.category);
    });
    const filterContainer = document.getElementById("filterContainer");
    filterContainer.innerHTML = "";
    const categoryNames = {
      all: { en: "All", sw: "Zote" },
      dress: { en: "Dresses", sw: "Nguo" },
      pants: { en: "Pants", sw: "Suruali" },
      skirt: { en: "Skirts", sw: "Sketi" },
      top: { en: "Tops", sw: "Blauzi" },
      active: { en: "Active", sw: "Michezo" },
      mens: { en: "Men's", sw: "Wanaume" },
      loungewear: { en: "Loungewear", sw: "Nguo za Nyumbani" },
      intimates: { en: "Intimates", sw: "Chupi" }
    };
    
    const sortedCats = Array.from(catsSet).sort();
    sortedCats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "filter-btn";
      const displayName = categoryNames[cat] ? categoryNames[cat][currentLang] : cat;
      btn.innerHTML = `<i class="fas fa-tag"></i> ${displayName}`;
      btn.setAttribute("data-cat", cat);
      btn.addEventListener("click", () => setFilter(cat));
      filterContainer.appendChild(btn);
    });
    setFilter("all");
  }
  
  function setupSearch() {
    const searchBtn = document.getElementById("searchBtn");
    const searchInput = document.getElementById("searchInput");
    const performSearch = () => {
      currentSearchTerm = searchInput.value;
      applyFiltersAndSearch();
    };
    searchBtn.addEventListener("click", performSearch);
    searchInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") performSearch();
    });
  }
  
  // ==============================================
  // SCROLL TO TOP
  // ==============================================
  function setupScrollToTop() {
    const scrollBtn = document.getElementById("scrollTopBtn");
    window.addEventListener("scroll", () => {
      if (window.scrollY > 300) {
        scrollBtn.classList.add("visible");
      } else {
        scrollBtn.classList.remove("visible");
      }
    });
    scrollBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  }
  
  function scrollToSection(sectionId) {
    const element = document.getElementById(sectionId);
    if (element) {
      element.scrollIntoView({ behavior: "smooth" });
    }
  }
  
  // ==============================================
  // INITIALIZE
  // ==============================================
  document.getElementById("closeModalBtn").addEventListener("click", closeModal);
  window.addEventListener("click", (e) => {
    const modal = document.getElementById("productModal");
    if (e.target === modal) closeModal();
  });
  
  document.getElementById("langToggleBtn").addEventListener("click", toggleLanguage);
  
  showSkeletonLoaders();
  
  setTimeout(() => {
    buildCategoryFilters();
    setupSearch();
    setupScrollToTop();
    renderProducts(masterProducts);
    updateUILanguage();
  }, 200);
</script>
